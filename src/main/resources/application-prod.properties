# Production Profile
server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

logging.level.root=WARN
logging.level.com.app.quantitymeasurementapp=INFO

management.endpoint.health.show-details=never

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=https://qma-backend-production.up.railway.app/login/oauth2/code/google

app.base-url=${APP_BASE_URL}
app.frontend-base-url=${FRONTEND_BASE_URL}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}