# Production Profile
server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

logging.level.root=WARN
logging.level.com.app.quantitymeasurementapp=INFO

management.endpoint.health.show-details=never

app.base-url=${APP_BASE_URL}
app.frontend-base-url=${FRONTEND_BASE_URL}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}